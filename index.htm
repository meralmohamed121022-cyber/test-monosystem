    <style>
        /* --- GLOBAL RESET & VARS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {

            --bg-secondary: #1a2942;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --accent-orange: #ff6b35;
            --accent-orange-light: #ff8c42;
            --card-bg: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.2);
            --nav-bg-start: #0d2137;
            --nav-bg-end: #1a3a52;
            --glass-bg: rgba(13, 33, 55, 0.85);

        /* --- TOGGLE BUTTONS --- */
        /* --- TOGGLE BUTTONS --- */
/* --- STATIC TOP CONTROLS --- */

        /* IFRAME FULLSCREEN CONTAINER */

.banner-slide::after {

}

        /* --- CONTENT CARDS --- */

        .gallery-dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; cursor: pointer; }
        .gallery-dot.active { background: var(--accent-orange); transform: scale(1.2); }
        .card-desc { color: var(--text-secondary); font-size: 14px; line-height: 1.5; margin-top: 10px; }

        /* --- LIGHTBOX --- */
        #lightbox {

        #lightbox img {

        #lightbox img:active { cursor: grabbing; }

        /* --- NAV BAR --- */
        #bottomNav {
            position: fixed; bottom: 0; left: 0; width: 100%;

        .nav-btn {

        .nav-btn.active i { transform: translateY(-3px); }

        /* --- SECTIONS MENU --- */
        #sectionsMenu {

        .section-btn {

            gap: 8px; width: calc(50% - 6px); min-height: 110px; padding: 15px 10px;

        .section-btn.full-width { width: 100%; flex-direction: row; min-height: 65px; gap: 15px; padding: 10px 20px; }
        
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 21500; display: none; backdrop-filter: blur(4px); transition: opacity 0.3s; }
        #overlay.show { display: block; }
        
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-primary); z-index: 20000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px; transition: opacity 0.3s; opacity: 0;
        }
        
        /* NEW LOADING HAND CSS */
        .🤚 { --skin-color: #E4C560; --tap-speed: 0.6s; --tap-stagger: 0.1s; position: relative; width: 80px; height: 60px; }
        .🤚:before { content: ''; display: block; width: 180%; height: 75%; position: absolute; top: 70%; right: 20%; background-color: black; border-radius: 40px 10px; filter: blur(10px); opacity: 0.3; }
        .🌴 { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: var(--skin-color); border-radius: 10px 40px; }
        .👍 { position: absolute; width: 120%; height: 38px; background-color: var(--skin-color); bottom: -18%; right: 1%; transform-origin: calc(100% - 20px) 20px; transform: rotate(-20deg); border-radius: 30px 20px 20px 10px; border-bottom: 2px solid rgba(0, 0, 0, 0.1); border-left: 2px solid rgba(0, 0, 0, 0.1); }
        .👍:after { width: 20%; height: 60%; content: ''; background-color: rgba(255, 255, 255, 0.3); position: absolute; bottom: -8%; left: 5px; border-radius: 60% 10% 10% 30%; border-right: 2px solid rgba(0, 0, 0, 0.05); }
        .👉 { position: absolute; width: 80%; height: 35px; background-color: var(--skin-color); bottom: 32%; right: 64%; transform-origin: 100% 20px; animation-duration: calc(var(--tap-speed) * 2); animation-timing-function: ease-in-out; animation-iteration-count: infinite; transform: rotate(10deg); }
        .👉:before { content: ''; position: absolute; width: 140%; height: 30px; background-color: var(--skin-color); bottom: 8%; right: 65%; transform-origin: calc(100% - 20px) 20px; transform: rotate(-60deg); border-radius: 20px; }
        .👉:nth-child(1) { animation-delay: 0; filter: brightness(70%); animation-name: tap-upper-1; }
        .👉:nth-child(2) { animation-delay: var(--tap-stagger); filter: brightness(80%); animation-name: tap-upper-2; }
        .👉:nth-child(3) { animation-delay: calc(var(--tap-stagger) * 2); filter: brightness(90%); animation-name: tap-upper-3; }
        .👉:nth-child(4) { animation-delay: calc(var(--tap-stagger) * 3); filter: brightness(100%); animation-name: tap-upper-4; }
        @keyframes tap-upper-1 { 0%, 50%, 100% { transform: rotate(10deg) scale(0.4); } 40% { transform: rotate(50deg) scale(0.4); } }
        @keyframes tap-upper-2 { 0%, 50%, 100% { transform: rotate(10deg) scale(0.6); } 40% { transform: rotate(50deg) scale(0.6); } }
        @keyframes tap-upper-3 { 0%, 50%, 100% { transform: rotate(10deg) scale(0.8); } 40% { transform: rotate(50deg) scale(0.8); } }
        @keyframes tap-upper-4 { 0%, 50%, 100% { transform: rotate(10deg) scale(1); } 40% { transform: rotate(50deg) scale(1); } }

// =========================================================================
// ALARMS & SCHEDULES
// =========================================================================
async function autoScheduleReminders() {
    if(!currentPharmacy) return;
    
    for (let offer of START_OFFERS) {
        const offerStartTime = new Date(offer.start_date);
        
        const triggerTimes = [
            { id: offer.id + '_30min', time: new Date(offerStartTime.getTime() - (30 * 60000)) }, 
            { id: offer.id + '_exact', time: offerStartTime } 
        ];
        
        for (let t of triggerTimes) {
            const { data: existing } = await supabaseClient
                .from('reminders')
                .select('id')
                .eq('pharmacy_number', currentPharmacy)
                .eq('offer_id', t.id); 
                
            if (!existing || existing.length === 0) {
                await supabaseClient.from('reminders').insert([{
                    pharmacy_number: currentPharmacy,
                    offer_id: t.id,
                    offer_title: offer.title,
                    trigger_time: t.time.toISOString(),
                    status: 'pending'
                }]);
            }
        }
    }
}

async function fetchReminders() {
    if(!currentPharmacy) return;
    const { data, error } = await supabaseClient
        .from('reminders')
        .select('*')
        .eq('pharmacy_number', currentPharmacy)
        .in('status', ['pending', 'snoozed']); 
    if(!error && data) userReminders = data;
}

async function stopAlarm() {
    const idInput = document.getElementById('currentReminderId');
    const id = idInput.value;
    const audio = document.getElementById('offerAlarmSound');
    
    clearTimeout(stopAudioTimeout);
    clearTimeout(autoSnoozeTimeout);
    
    if (audio) {
        audio.pause();
        audio.currentTime = 0;
    }
    
    document.getElementById('alarmActionModal').style.display = 'none';

    if (id) {
        try {
            const { error } = await supabaseClient
                .from('reminders')
                .update({ status: 'completed' }) 
                .eq('id', id);
                
            if (error) throw error;

            userReminders = userReminders.filter(r => r.id !== id);
            idInput.value = "";
        } catch (err) {
            console.error("Failed to finalize alarm in database:", err);
            userReminders = userReminders.filter(r => r.id !== id);
        }
    }
}

async function snoozeAlarm(isAuto = false) {
    const id = document.getElementById('currentReminderId').value;
    const snoozeVal = document.getElementById('snoozeSelect').value;
    let newTriggerTime = new Date();

    clearTimeout(stopAudioTimeout);
    clearTimeout(autoSnoozeTimeout);

    if (snoozeVal === '1') {
        newTriggerTime.setHours(newTriggerTime.getHours() + 1);
    } else if (snoozeVal === '2') {
        newTriggerTime.setHours(newTriggerTime.getHours() + 2);
    } else if (snoozeVal === 'custom') {
        const customVal = document.getElementById('customSnoozeTime').value;
        if (!customVal && !isAuto) {
            alert('يرجى تحديد الوقت والتاريخ المخصص أولاً!');
            autoSnoozeTimeout = setTimeout(() => {
                document.getElementById('snoozeSelect').value = "1";
                snoozeAlarm(true);
            }, 60000);
            return;
        }
        newTriggerTime = new Date(customVal);
    }

    const audio = document.getElementById('offerAlarmSound');
    if (audio) {
        audio.pause();
        audio.currentTime = 0;
    }
    document.getElementById('alarmActionModal').style.display = 'none';

    if(id) {
        await supabaseClient.from('reminders').update({ 
            status: 'snoozed',
            trigger_time: newTriggerTime.toISOString()
        }).eq('id', id);
        await fetchReminders(); 
    }
}

// =========================================================================
// UI RENDER LOGIC (Banners) - الحجم الكامل، تقسيم البنرات 3، وربط صحيح بـ Lightbox
// =========================================================================
let bannerIntervals = [];
let currentBannerIndices = [];

function renderBanners() {
    const container = document.getElementById('bannerContainer');
    if (!container) return;
    
    if (!APPDATA.banners || APPDATA.banners.length === 0) {
        container.style.display = 'none';
        return;
    }

    container.style.display = 'block';
    container.innerHTML = ''; 

    // تقسيم البنرات لمجموعات (أقصى عدد 3)
    const chunkSize = 6;
    const chunks = [];
    for (let i = 0; i < APPDATA.banners.length; i += chunkSize) {
        chunks.push(APPDATA.banners.slice(i, i + chunkSize));
    }

    if (bannerIntervals.length > 0) {
        bannerIntervals.forEach(clearInterval);
        bannerIntervals = [];
    }
    currentBannerIndices = new Array(chunks.length).fill(0);

    chunks.forEach((chunk, chunkIdx) => {
        let slidesHtml = '';
        
        chunk.forEach((banner) => {
            const hasImage = banner.imageUrl && banner.imageUrl.trim() !== '';
            const hasVideo = banner.videoUrl && banner.videoUrl.trim() !== '';
            const hasColor = banner.color && banner.color.trim() !== '';
            
            if (!hasImage && !hasVideo && !hasColor) return;
            
            let mediaHTML = '';
            if (hasVideo) {
                mediaHTML = `<video class="banner-bg-media" autoplay muted loop playsinline disablePictureInPicture style="width:100%; height:auto; display:block;">
                                <source src="${banner.videoUrl}" type="video/mp4">
                             </video>`;
            } else if (hasImage) {
                // 🔴 التعديل هنا: إضافة onpointerdown لضمان إطلاق الحدث بغض النظر عن المتصفح أو الجوال
                mediaHTML = `<img class="banner-bg-media zoomable-img" src="${banner.imageUrl}" alt="${banner.title || ''}" 
                                style="width:100%; height:auto; display:block; object-fit:contain; border-radius:12px; cursor:zoom-in;" 
                                onclick="openLightbox('${banner.imageUrl}');">`;
            }
            
            const bgStyle = (!hasImage && !hasVideo) ? `background: ${banner.color};` : '';
            
            slidesHtml += `
                <div class="banner-slide" style="${bgStyle} flex: 0 0 100%; position: relative;">
                    ${mediaHTML}
                </div>
            `;
        });

        if (slidesHtml) {
            const sliderBlock = document.createElement('div');
            sliderBlock.className = 'slider-block';
            sliderBlock.style.cssText = 'position: relative; overflow: hidden; margin-bottom: 25px; border-radius: 12px; background: transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.1);';
            
            let dotsHtml = '';
            if (chunk.length > 1) {
                for (let i = 0; i < chunk.length; i++) {
                    dotsHtml += `<div class="banner-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${chunkIdx}, ${i})"></div>`;
                }
                dotsHtml = `<div class="banner-dots" id="bannerDots-${chunkIdx}" style="position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: center; gap: 5px; z-index: 10;">${dotsHtml}</div>`;
            }

            sliderBlock.innerHTML = `
                <div class="banner-wrapper" id="bannerWrapper-${chunkIdx}" style="display: flex; transition: transform 0.4s ease;">
                    ${slidesHtml}
                </div>
                ${dotsHtml}
            `;
            container.appendChild(sliderBlock);

            if (chunk.length > 1) {
                const interval = setInterval(() => {
                    currentBannerIndices[chunkIdx] = (currentBannerIndices[chunkIdx] + 1) % chunk.length;
                    goToSlide(chunkIdx, currentBannerIndices[chunkIdx]);
                }, 5000); 
                bannerIntervals.push(interval);
            }
        }
    });
}

function goToSlide(chunkIdx, slideIdx) {
    const wrapper = document.getElementById(`bannerWrapper-${chunkIdx}`);
    if (!wrapper) return;
    
    currentBannerIndices[chunkIdx] = slideIdx;
    wrapper.style.transform = `translateX(-${slideIdx * 100}%)`;
    
    const dotsContainer = document.getElementById(`bannerDots-${chunkIdx}`);
    if (dotsContainer) {
        Array.from(dotsContainer.children).forEach((dot, i) => {
            dot.classList.toggle('active', i === slideIdx);
        });
    }
}

function renderContent() {
    const grid = document.getElementById('contentGrid');
    if (!grid) return;
    
    grid.innerHTML = '';
    if (!APPDATA.content || APPDATA.content.length === 0) {
        grid.innerHTML = `<p style="text-align:center; color:var(--text-secondary); margin-top:20px;">. .</p>`;
        return;
    }

    APPDATA.content.forEach((item, idx) => {
        if (item.type === 'video' && (!item.videoUrl || item.videoUrl.trim() === '')) return;
        
        const card = document.createElement('div');
        card.className = 'content-card';
        
        let mediaHTML = '';
        if (item.type === 'image') {
            const imgs = item.images;
            let imgSlides = '';
            let dots = '';
            if (imgs.length > 0) {
                imgs.forEach((url, i) => {
                    const display = i === 0 ? 'block' : 'none';
                    imgSlides += `<img src="${url}" style="display:${display};" class="gallery-img-${idx} zoomable-img" data-card-idx="${idx}" onclick="openLightbox('${url}')">`;
                    if(imgs.length > 1) {
                        dots += `<div class="gallery-dot ${i===0?'active':''}" onclick="changeGallerySlide(${idx}, ${i})"></div>`;
                    }
                });
                mediaHTML = `
                    <div class="media-container">
                        ${imgSlides}
                        <div class="zoom-icon"><i class="fas fa-search-plus"></i></div>
                        <div class="gallery-dots" id="dots-${idx}" style="display: ${imgs.length > 1 ? 'flex' : 'none'};">
                            ${dots}
                        </div>
                    </div>`;
            }
        } else if (item.type === 'video') {
            mediaHTML = `
                <div class="media-container" style="height: 220px;">
                    <video autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">
                        <source src="${item.videoUrl}" type="video/mp4">
                    </video>
                </div>`;
        }

        card.innerHTML = `
            <div class="card-header"><h3>${item.title}</h3></div>
            ${mediaHTML}
            <p class="card-desc">${item.desc}</p>
        `;
        grid.appendChild(card);
    });

    setTimeout(() => {
        const allImages = document.querySelectorAll('.zoomable-img');
        allImages.forEach(img => { enablePinchZoomOnImage(img); });
    }, 100);
}

function changeGallerySlide(cardIdx, imgIdx) {
    const images = document.querySelectorAll(`.gallery-img-${cardIdx}`);
    images.forEach(img => { img.style.display = 'none'; });
    if(images[imgIdx]) images[imgIdx].style.display = 'block';
    
    const dots = document.getElementById(`dots-${cardIdx}`);
    if (dots) {
        Array.from(dots.children).forEach(d => { d.classList.remove('active'); });
        if(dots.children[imgIdx]) dots.children[imgIdx].classList.add('active');
    }
}

// =========================================================================
// LIGHTBOX & ZOOM LOGIC (Using your existing HTML div)
// =========================================================================
function openLightbox(url) {
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightboxImg');
    
    if (!lb || !img) {
        console.error("Lightbox elements not found in HTML!");
        return;
    }
    
    img.src = url;
    
    // إعادة تعيين التحجيم
    img.style.transform = 'scale(1)';
    img.style.transition = 'transform 0.3s ease';
    
    // عرض اللايتبوكس
    lb.style.display = 'flex';
    lb.classList.add('show');
    
    // تفعيل دالة الزوم على الصورة بداخل الـ Lightbox
    enablePinchZoomOnImage(img);
}

function closeLightbox(event) {
    // التأكد من إغلاق المربع فقط إذا ضغطت على الخلفية أو الزر، وتجنب الإغلاق إذا كان الزوم شغال
    if (event && event.target.id !== 'lightbox' && !event.target.classList.contains('lightbox-close')) {
        return;
    }
    
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightboxImg');
    if (!lb || !img) return;
    
    lb.classList.remove('show');
    setTimeout(() => { 
        lb.style.display = 'none'; 
        img.style.transform = 'scale(1)';
        img.src = '';
    }, 300);
}

function enablePinchZoomOnImage(imageElement) {
    if (!imageElement) return;
    
    // تصفير الخصائص السابقة
    let imageScale = 1;
    let lastScale = 1;
    let startData = { x: 0, y: 0, distance: 0 };
    
    const getDistance = (event) => {
        return Math.hypot(event.touches[0].pageX - event.touches[1].pageX, event.touches[0].pageY - event.touches[1].pageY);
    };

    imageElement.addEventListener('touchstart', (event) => {
        if (event.touches.length === 2) {
            event.preventDefault();
            startData.x = (event.touches[0].pageX + event.touches[1].pageX) / 2;
            startData.y = (event.touches[0].pageY + event.touches[1].pageY) / 2;
            startData.distance = getDistance(event);
            lastScale = imageScale;
        }
    }, { passive: false });

    imageElement.addEventListener('touchmove', (event) => {
        if (event.touches.length === 2) {
            event.preventDefault();
            event.stopPropagation();
            let scale = event.scale ? event.scale : getDistance(event) / startData.distance;
            imageScale = Math.min(Math.max(1, lastScale * scale), 5); // أقصى حد للتكبير هو 5
            
            const deltaX = (event.touches[0].pageX + event.touches[1].pageX) / 2 - startData.x;
            const deltaY = (event.touches[0].pageY + event.touches[1].pageY) / 2 - startData.y;
            const transform = `translate(${deltaX}px, ${deltaY}px) scale(${imageScale})`;
            
            imageElement.style.transform = transform;
            imageElement.style.WebkitTransform = transform;
            imageElement.style.zIndex = "99999";
            imageElement.style.transition = "none";
        }
    }, { passive: false });

    imageElement.addEventListener('touchend', (event) => {
        if (event.touches.length < 2) {
            if (imageScale > 1.1) {
                // إعادة الصورة لحجمها الطبيعي إذا لم تكن قيد التكبير
                setTimeout(() => {
                    imageElement.style.transform = 'scale(1)';
                    imageElement.style.WebkitTransform = 'scale(1)';
                    imageElement.style.transition = 'transform 0.3s ease';
                    imageScale = 1;
                    lastScale = 1;
                }, 300);
            }
        }
    }, { passive: false });
    
    // لتجنب التكبير عند الضغط مرتين على الهاتف
    let lastTap = 0;
    imageElement.addEventListener('touchend', function(event) {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        if (tapLength < 300 && tapLength > 0) {
            event.preventDefault();
            imageElement.style.transform = 'scale(1)';
            imageElement.style.WebkitTransform = 'scale(1)';
            imageElement.style.transition = 'transform 0.3s ease';
            imageScale = 1;
            lastScale = 1;
        }
        lastTap = currentTime;
    });
}

// =========================================================================
// UI CONTROLS & IFRAME
// =========================================================================
function toggleMode() {
    document.body.classList.toggle('day-mode');
    localStorage.setItem('theme', document.body.classList.contains('day-mode') ? 'day' : 'night');
    const icon = document.querySelector('.mode-toggle i');
    if (icon) icon.className = document.body.classList.contains('day-mode') ? 'fas fa-sun' : 'fas fa-moon';
}

function loadTheme() {
    if (localStorage.getItem('theme') === 'day') {
        document.body.classList.add('day-mode');
        const icon = document.querySelector('.mode-toggle i');
        if (icon) icon.className = 'fas fa-sun';
    }
}

function toggleNavAndScroll() {
    const nav = document.getElementById('bottomNav');
    const icon = document.querySelector('.scroll-toggle i');
    if (!nav || !icon) return;
    
    if (!nav.classList.contains('hidden')) {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        nav.classList.add('hidden');
        icon.className = 'fas fa-arrow-up';
    } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        nav.classList.remove('hidden');
        icon.className = 'fas fa-arrow-down';
    }
}

function closeAllMenus() {
    const menu = document.getElementById('sectionsMenu');
    const overlay = document.getElementById('overlay');
    if (menu) menu.classList.remove('show');
    if (overlay) overlay.classList.remove('show');
}

function openLink(url) {
    if (!url || url.trim() === '#') return;
    closeAllMenus();

    const phNo = localStorage.getItem('pharmacy_number');
    
    // ✅ إضافة: إنشاء توكن مؤقت
    const token = crypto.randomUUID();
    sessionStorage.setItem("_tk", token);

    let finalUrl = url;
    
    if (phNo) {
        const separator = url.includes('?') ? '&' : '?';
        // ✅ إضافة: حط التوكن مع الـ ph في الـ URL
        finalUrl = `${url}${separator}ph=${encodeURIComponent(phNo)}&_tk=${token}`;
    } else {
        finalUrl = `${url}?_tk=${token}`;
    }

    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(url)) {
            btn.classList.add('active');
        }
    });

    const container = document.getElementById('iframeContainer');
    const iframe = document.getElementById('embeddedFrame');
    const errorBox = document.getElementById('iframeError');
    const loader = document.getElementById('loadingOverlay');

    if (!container || !iframe || !errorBox) return;

    errorBox.classList.remove('show');

    if (loader) {
        loader.style.display = 'flex';
        loader.style.opacity = '1';
        loader.classList.remove('hidden');
    }

    container.classList.add('show');

    iframe.onload = null;
    iframe.onerror = null;

    setTimeout(() => {
        let hasLoaded = false;
        let loadTimeout = setTimeout(() => {
            if (!hasLoaded) {
                hideLoaderFast(loader);
                errorBox.classList.add('show');
            }
        }, 15000);

        iframe.onload = function() {
            try {
                const frameSrc = iframe.contentWindow.location.href;
                if (frameSrc === 'about:blank') return;
            } catch(e) {}
            
            hasLoaded = true;
            clearTimeout(loadTimeout);
            hideLoaderFast(loader);

            const phNo = localStorage.getItem('pharmacy_number');
            if (phNo) {
                setTimeout(() => {
                    console.log("Sending Pharmacy ID to iframe:", phNo);
                    iframe.contentWindow.postMessage({ type: 'LOGIN_DATA', ph: phNo }, '*'); 
                }, 500);
            }
        };
        
        iframe.onerror = function() {
            hasLoaded = true;
            clearTimeout(loadTimeout);
            hideLoaderFast(loader);
            errorBox.classList.add('show');
        };

        iframe.src = finalUrl;
    }, 50);
}
function hideLoaderFast(loader) {
    if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => {
            loader.classList.add('hidden');
            loader.style.display = 'none';
        }, 150);
    }
}

function closeIframe() {
    const container = document.getElementById('iframeContainer');
    const errorBox = document.getElementById('iframeError');
    const iframe = document.getElementById('embeddedFrame');
    
    if (container) container.classList.remove('show');
    if (errorBox) errorBox.classList.remove('show');
    
    setTimeout(() => { 
        if (iframe) iframe.src = 'about:blank'; 
    }, 400);
}

function goHome() {
    closeIframe();
    closeAllMenus();
    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => btn.classList.remove('active'));
    const homeBtn = document.querySelector('.nav-btn[onclick="goHome()"]');
    if (homeBtn) homeBtn.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleSections() {
    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => btn.classList.remove('active'));
    const sectionsBtn = document.querySelector('.nav-btn[onclick="toggleSections()"]');
    if (sectionsBtn) sectionsBtn.classList.add('active');
    
    const menu = document.getElementById('sectionsMenu');
    const overlay = document.getElementById('overlay');
    if (menu) menu.classList.add('show');
    if (overlay) overlay.classList.add('show');
}

function triggerAlarm(reminderObj) {
    const audio = document.getElementById('offerAlarmSound');
    if (audio) {
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Audio prevented:", e));
    }

    let timeString = "";
    let isExactlyNow = false;
    
    const cleanId = reminderObj.offer_id.replace('_30min', '').replace('_exact', '');
    const originalOffer = START_OFFERS.find(o => o.id === cleanId);
    
    if (originalOffer) {
        const offerTime = new Date(originalOffer.start_date);
        timeString = " الساعة " + offerTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const diff = Math.abs(new Date().getTime() - offerTime.getTime());
        if (diff < 60000) { isExactlyNow = true; }
    }

    const message = isExactlyNow 
        ? `${reminderObj.offer_title} بدأ الآن! 🔥` 
        : `${reminderObj.offer_title}${timeString} سيبدأ خلال 30 دقيقة! ⏳`;

    const titleDisplay = document.getElementById('alarmOfferName');
    if (titleDisplay) titleDisplay.innerText = message;
    
    const actionModal = document.getElementById('alarmActionModal');
    if (actionModal) actionModal.style.display = 'flex';
    
    const idInput = document.getElementById('currentReminderId');
    if (idInput) idInput.value = reminderObj.id;

    const notifTitle = "تنبيه MONO SYSTEM";
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
            type: 'SHOW_NOTIFICATION',
            title: notifTitle,
            body: message
        });
    } else {
        showBrowserNotification(notifTitle, message);
    }

    clearTimeout(stopAudioTimeout);
    stopAudioTimeout = setTimeout(() => {
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
    }, 20000);
}

function startAlarmChecker() {
    if(alarmCheckInterval) clearInterval(alarmCheckInterval);
    
    alarmCheckInterval = setInterval(() => {
        const nowMs = new Date().getTime();
        
        userReminders.forEach((rem) => {
            const trigTimeMs = new Date(rem.trigger_time).getTime();
            const isTooOld = (nowMs - trigTimeMs) > (60 * 60 * 1000); 

            if ((rem.status === 'pending' || rem.status === 'snoozed') && nowMs >= trigTimeMs && !isTooOld) {
                console.log(`Triggering alarm: ${rem.offer_title}`);
                rem.status = 'firing'; 
                triggerAlarm(rem); 
            }
        });
    }, 5000); 
}

function openScannerDirectly() {
    const loader = document.getElementById('loadingOverlay');
    if (loader) {
        loader.style.display = 'flex';
        loader.style.opacity = '1';
    }
    
    setTimeout(() => {
        openLink('offersgit.html#scanner');
    }, 100);
}
