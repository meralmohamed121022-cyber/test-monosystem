<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Ultimate Payment Calculator - Official Saudi Riyal Symbol</title>

    <link rel="preload"
          href="https://www.sama.gov.sa/ar-sa/Currency/Documents/Saudi_Riyal_Symbol-2.svg"
          as="image">

   <style>
        .official-riyal-symbol,
        .sar-icon {
            display: inline-block;
            width: 1.4em;
            height: 1.4em;
            background-image: url("https://www.sama.gov.sa/ar-sa/Currency/Documents/Saudi_Riyal_Symbol-2.svg");
            background-size: contain;
            background-repeat: no-repeat;
            vertical-align: middle;
        }

        .official-riyal-symbol {
            width: 1.2em;
            height: 1.2em;
            margin-right: 0.3em;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 25%, #388E3C 50%, #43A047 75%, #4CAF50 100%);
            min-height: 100vh;
            padding: 15px;
            animation: saudiGradient 20s ease infinite;
            /* تم إزالة min-width: 1200px للسماح بالتجاوب مع الجوال */
            overflow-x: hidden; /* تم التعديل لمنع التمرير العرضي المزعج */
        }

        @keyframes saudiGradient {
            0%, 100% { background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 25%, #388E3C 50%, #43A047 75%, #4CAF50 100%); }
            25%       { background: linear-gradient(135deg, #2E7D32 0%, #388E3C 25%, #43A047 50%, #4CAF50 75%, #66BB6A 100%); }
            50%       { background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 25%, #FFC107 50%, #FF9800 75%, #FF5722 100%); }
            75%       { background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 25%, #81C784 50%, #A5D6A7 75%, #C8E6C9 100%); }
        }

        .container {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            overflow: hidden;
            backdrop-filter: blur(20px);
            border: 3px solid #4CAF50;
        }

        .header {
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #4CAF50 100%);
            color: white;
            padding: 45px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🇸🇦';
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 3em;
            opacity: 0.3;
            animation: wave 3s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50%       { transform: rotate(15deg); }
        }

        .header h1 {
            font-size: clamp(2em, 5vw, 3.6em); /* جعل الخط متجاوباً */
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header p {
            font-size: clamp(1em, 3vw, 1.4em);
            position: relative;
            z-index: 2;
            opacity: 0.95;
        }

        .main-content { padding: 45px; }

        .grid {
            display: grid;
            /* تم تصغير 480px لتناسب الشاشات الأصغر */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
            margin-bottom: 35px;
        }

        .full-width-card { grid-column: 1 / -1; }

        .card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.12);
            border: 3px solid #4CAF50;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 70px rgba(0,0,0,0.2);
            border-color: #2E7D32;
        }

        .card-title {
            font-size: 1.6em;
            font-weight: bold;
            margin-bottom: 35px;
            color: #2E7D32;
            display: flex;
            align-items: center;
            gap: 18px;
            padding-bottom: 25px;
            border-bottom: 3px solid #4CAF50;
            flex-wrap: wrap;
        }

        .input-group { margin-bottom: 30px; }

        .input-group label {
            display: block;
            margin-bottom: 15px;
            font-weight: 600;
            color: #2E7D32;
            font-size: 1.2em;
        }

        .input-field {
            width: 100%;
            padding: 20px 30px;
            border: 3px solid #C8E6C9;
            border-radius: 18px;
            font-size: 20px;
            transition: all 0.4s ease;
            background: #F1F8E9;
            direction: ltr;
        }

        .input-field:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 6px rgba(76,175,80,0.25);
            background: white;
            transform: scale(1.02);
        }

        .input-field.auto-extracted {
            border-color: #2E7D32;
            background: linear-gradient(135deg, #E8F5E8, #C8E6C9);
            font-weight: bold;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        }

        .currency-display { position: relative; }

        .currency-prefix {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #2E7D32;
            font-weight: bold;
            font-size: 1.3em;
            z-index: 2;
        }

        .currency-display .input-field { padding-left: 55px; }

        .payment-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
        }

        .actual-cards-section {
            border: 3px dashed #4CAF50;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            background: linear-gradient(45deg, rgba(76,175,80,0.08), rgba(129,199,132,0.08));
            position: relative;
        }

        .actual-cards-section::before {
            content: '💳 Manual Input Zone';
            position: absolute;
            top: -15px;
            left: 25px;
            background: white;
            padding: 8px 15px;
            font-weight: bold;
            color: #2E7D32;
            border-radius: 20px;
            font-size: 14px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        .add-btn {
            background: linear-gradient(135deg, #2E7D32 0%, #4CAF50 100%);
            color: white;
            border: none;
            padding: 18px 35px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.4s ease;
            font-size: 18px;
            display: inline-block;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
        }

        .remove-btn {
            background: #F44336;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            margin-left: 18px;
            font-size: 18px;
            transition: all 0.4s ease;
        }

        .remove-btn:hover {
            transform: scale(1.2) rotate(360deg);
            background: #D32F2F;
        }

        .result-card {
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #4CAF50 100%);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .result-value {
            font-size: clamp(2.5em, 8vw, 4em); /* متجاوب */
            font-weight: bold;
            margin: 35px 0;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.4);
            position: relative;
            z-index: 2;
            word-break: break-word;
        }

        .result-value::before {
            content: '';
            display: inline-block;
            width: 1.2em;
            height: 1.2em;
            background-image: url("https://www.sama.gov.sa/ar-sa/Currency/Documents/Saudi_Riyal_Symbol-2.svg");
            background-size: contain;
            background-repeat: no-repeat;
            vertical-align: middle;
            margin-right: 0.3em;
            filter: brightness(0) invert(1);
        }

        .btn {
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: bold;
            margin: 12px 8px 0 0;
            transition: all 0.4s ease;
            font-size: 18px;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #F57C00 0%, #E65100 100%);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* جعل الشبكة متجاوبة */
            gap: 30px;
        }

        .results-grid .main-total { grid-column: 1 / -1; }

        .total-display {
            text-align: center;
            font-weight: bold;
            color: #2E7D32;
            font-size: clamp(1.2em, 4vw, 1.5em);
            margin-top: 20px;
            padding: 20px;
            background: rgba(76,175,80,0.15);
            border-radius: 15px;
            border: 3px solid rgba(76,175,80,0.3);
            word-break: break-word;
        }

        .total-display::before {
            content: '';
            display: inline-block;
            width: 1em;
            height: 1em;
            background-image: url("https://www.sama.gov.sa/ar-sa/Currency/Documents/Saudi_Riyal_Symbol-2.svg");
            background-size: contain;
            background-repeat: no-repeat;
            vertical-align: middle;
            margin-right: 0.3em;
        }

        /* ===== Calculator CSS ===== */

        /* 1. Toggle Button - Scientific Calculator Look */
        .calc-toggle-btn {
          position: fixed; top: 50%; right: 10px;
          transform: translateY(-50%);
          width: 60px; height: 60px; border-radius: 16px; 
          z-index: 1002;
          background: linear-gradient(135deg, #0a1e3d, #1a3458);
          border: 2px solid #ff6b35;
          box-shadow: 0 8px 20px rgba(10, 30, 61, 0.5);
          cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          transition: all .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .calc-toggle-btn svg { width: 32px; height: 32px; fill: #fff; }
        .calc-toggle-btn:hover { transform: translateY(-50%) scale(1.1); box-shadow: 0 12px 25px rgba(255, 107, 53, 0.4); }
        .calc-toggle-btn:active { 
          transform: translateY(-50%) scale(0.95); 
          background: linear-gradient(135deg, #081629, #0f2340);
        }

        /* 2. Layout & Popup - Resizable */
        .calculator-popup {
          position: fixed; 
          bottom: 20px; 
          left: 50%;
          transform: translate(-50%, 0) scale(0.8);
          width: 95vw; /* تعديل ليتناسب مع الجوال */
          max-width: 480px; 
          height: 80vh; /* تعديل الارتفاع ليتناسب مع شاشة الجوال */
          max-height: 650px;
          z-index: 1003; 
          opacity: 0; 
          visibility: hidden;
          transition: transform .4s cubic-bezier(0.19, 1, 0.22, 1), opacity .4s ease;
        }
        .calculator-popup.active { 
          opacity: 1; 
          visibility: visible; 
          transform: translate(-50%, 0) scale(1); 
        }

        .calc-container {
          background: #0a1e3d; 
          border-radius: 24px;
          padding: 20px;
          border: 1px solid rgba(255, 107, 53, 0.3);
          box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
          color: #fff; 
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          height: 100%;
          width: 100%;
          display: flex;
          flex-direction: column;
          position: relative;
          overflow: hidden;
          box-sizing: border-box;
        }

        /* Resize Handles */
        .resize-handle {
          position: absolute;
          background: rgba(255, 107, 53, 0.4);
          transition: background 0.2s;
          z-index: 1001;
        }
        .resize-handle:hover { background: rgba(255, 107, 53, 0.7); }
        .resize-handle:active { background: rgba(255, 107, 53, 0.9); }

        .resize-handle-top { top: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 6px; cursor: ns-resize; border-radius: 0 0 6px 6px; }
        .resize-handle-bottom { bottom: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 6px; cursor: ns-resize; border-radius: 6px 6px 0 0; }
        .resize-handle-left { left: 0; top: 50%; transform: translateY(-50%); width: 6px; height: 80px; cursor: ew-resize; border-radius: 0 6px 6px 0; }
        .resize-handle-right { right: 0; top: 50%; transform: translateY(-50%); width: 6px; height: 80px; cursor: ew-resize; border-radius: 6px 0 0 6px; }

        .resize-handle-corner {
          position: absolute;
          width: 28px;
          height: 28px;
          background: rgba(255, 107, 53, 0.85);
          border: 2px solid #fff;
          transition: all 0.2s;
          z-index: 1002;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          font-size: 18px;
          font-weight: bold;
        }
        .resize-handle-corner:hover { background: #ff6b35; transform: scale(1.25); box-shadow: 0 0 15px rgba(255, 107, 53, 0.6); }
        .resize-handle-corner:active { transform: scale(1.15); box-shadow: 0 0 20px rgba(255, 107, 53, 0.9); }

        .resize-handle-tl { top: -3px; left: -3px; cursor: nwse-resize; border-radius: 24px 6px 6px 6px; }
        .resize-handle-tl::after { content: '⇖'; }
        .resize-handle-tr { top: -3px; right: -3px; cursor: nesw-resize; border-radius: 6px 24px 6px 6px; }
        .resize-handle-tr::after { content: '⇗'; }
        .resize-handle-bl { bottom: -3px; left: -3px; cursor: nesw-resize; border-radius: 6px 6px 6px 24px; }
        .resize-handle-bl::after { content: '⇙'; }
        .resize-handle-br { bottom: -3px; right: -3px; cursor: nwse-resize; border-radius: 6px 6px 24px 6px; }
        .resize-handle-br::after { content: '⇘'; }

        /* Header */
        .calc-header { 
          display: flex; 
          justify-content: space-between; 
          align-items: center; 
          margin-bottom: 16px;
          flex-shrink: 0;
        }
        .calc-title { 
          font-size: clamp(16px, 4vw, 22px);
          font-weight: 700; 
          color: #ff6b35; 
          display: flex; 
          align-items: center; 
          gap: 8px; 
        }
        .calc-title svg { width: clamp(18px, 4vw, 24px); height: clamp(18px, 4vw, 24px); }
        .calc-control-btn {
          width: clamp(28px, 6vw, 40px);
          height: clamp(28px, 6vw, 40px);
          border-radius: 50%; 
          border: none;
          font-size: clamp(16px, 4vw, 22px);
          cursor: pointer; 
          background: rgba(255,255,255,0.1); 
          color: #fff;
          display: flex; 
          align-items: center; 
          justify-content: center; 
          transition: .2s;
          flex-shrink: 0;
        }
        .calc-control-btn:hover { background: #ff4444; }
        .calc-control-btn:active { transform: scale(0.9); background: #cc0000; }

        /* Display Screen */
        .calc-display {
          background: #152946; 
          border-radius: 16px;
          padding: clamp(12px, 3vw, 20px);
          margin-bottom: 16px;
          box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
          text-align: right; 
          border: 1px solid rgba(255,255,255,0.05);
          flex-shrink: 0;
        }
        .calc-expression {
          font-size: clamp(14px, 3.5vw, 24px);
          color: #aabbc3;
          min-height: clamp(21px, 5vw, 36px);
          overflow-x: auto; 
          white-space: nowrap;
          font-family: 'Courier New', monospace;
        }
        .calc-result {
          margin-top: 6px; 
          color: #4ee6a4;
          font-size: clamp(24px, 6vw, 48px);
          font-weight: 700;
          white-space: nowrap; 
          overflow-x: auto;
        }

        /* Tokens Styling */
        .calc-op { color: #ff9f43; margin: 0 1px; }
        .calc-num { color: #fff; }
        .calc-caret {
          display: inline-block; 
          width: 2px; 
          height: 1.2em;
          background: #ff6b35; 
          margin: 0 -1px;
          vertical-align: text-bottom;
          animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Grid Keys */
        .calc-keys {
          display: grid; 
          grid-template-columns: repeat(4, 1fr);
          grid-template-rows: repeat(5, 1fr);
          gap: clamp(8px, 2vw, 12px);
          direction: rtl;
          flex: 1;
          min-height: 0;
        }

        /* Buttons */
        .btn-calc {
          border: none; 
          border-radius: 14px;
          font-size: clamp(18px, 4vw, 26px);
          font-weight: 600;
          cursor: pointer; 
          transition: all .1s;
          background: #243852; 
          color: #fff;
          box-shadow: 0 4px 0 #1a2a3f;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 0;
          padding: 0;
        }
        .btn-calc:active { 
          transform: translateY(4px); 
          box-shadow: none;
          background: #1a2a3f;
          filter: brightness(0.8);
        }
        .btn-calc.operator { color: #ff9f43; background: rgba(255, 159, 67, 0.1); }
        .btn-calc.operator:active { background: rgba(255, 159, 67, 0.25); }
        .btn-calc.action { background: rgba(255, 80, 80, 0.2); color: #ff6b6b; }
        .btn-calc.action:active { background: rgba(255, 80, 80, 0.4); }
        .btn-calc.equal {
          background: linear-gradient(135deg, #ff6b35, #ff8555);
          box-shadow: 0 4px 0 #c4491a; 
          color: #fff;
          grid-column: 1;
          grid-row: 5; 
        }
        .btn-calc.equal:active { background: linear-gradient(135deg, #cc4422, #cc5533); }

        /* Bottom Row Layout */
        .arrows-container {
          grid-column: 2;
          grid-row: 5;
          display: flex; 
          gap: clamp(3px, 1vw, 6px);
          direction: ltr;
        }
        .btn-calc.arrow-btn { flex: 1; font-size: clamp(14px, 3vw, 20px); background: #1c2e44; }
        .btn-calc.arrow-btn:active { background: #0f1a2b; }

        /* Copy Button */
        .calc-copy-row { 
          margin-top: 14px; 
          display: flex; 
          justify-content: center;
          flex-shrink: 0;
        }
        .calc-copy-btn {
          background: transparent; 
          border: 1px solid #4ee6a4;
          color: #4ee6a4; 
          border-radius: 20px;
          padding: clamp(6px, 2vw, 10px) clamp(18px, 4vw, 28px);
          font-size: clamp(12px, 3vw, 15px);
          font-weight: 600;
          cursor: pointer; 
          transition: .2s;
          display: flex; 
          align-items: center; 
          gap: 6px;
        }
        .calc-copy-btn svg { width: clamp(12px, 3vw, 16px); height: clamp(12px, 3vw, 16px); }
        .calc-copy-btn:hover { background: rgba(78, 230, 164, 0.1); }
        .calc-copy-btn:active { transform: scale(0.95); background: rgba(78, 230, 164, 0.2); }

        /* Copy Notification */
        .calc-copy-notification {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%) scale(0);
          background: rgba(78, 230, 164, 0.95);
          color: #0a1e3d;
          padding: 20px 40px;
          border-radius: 15px;
          font-size: 1.2em;
          font-weight: bold;
          z-index: 2500;
          box-shadow: 0 20px 60px rgba(0,0,0,0.4);
          transition: transform 0.3s ease;
        }
        .calc-copy-notification.show { transform: translate(-50%, -50%) scale(1); }

        .calc-resizing {
          user-select: none;
          -webkit-user-select: none;
          -moz-user-select: none;
          -ms-user-select: none;
        }

        /* ========================================= */
        /* استعلامات الوسائط (Media Queries) للهواتف */
        /* ========================================= */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { border-radius: 15px; border-width: 2px; }
            .header { padding: 25px 15px; }
            .header::before { font-size: 2em; left: 15px; top: 15px; }
            .main-content { padding: 20px 15px; }
            .card { padding: 25px 15px; border-radius: 20px; }
            .card-title { font-size: 1.4em; flex-direction: column; align-items: flex-start; gap: 10px; }
            .input-field { padding: 15px 20px; font-size: 18px; }
            .currency-display .input-field { padding-left: 45px; }
            .currency-prefix { left: 12px; font-size: 1.1em; }
            .btn, .add-btn { width: 100%; margin: 10px 0; padding: 15px; text-align: center; display: block; }
            .remove-btn { margin-left: 0; margin-top: 10px; }
            .grid, .results-grid { gap: 20px; margin-bottom: 20px; }
            .actual-cards-section { padding: 20px 15px; }
            .result-value { margin: 20px 0; }
            .calculator-popup { width: 95vw; height: 75vh; bottom: 10px; }
        }
</style>
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span class="sar-icon"></span>
                MWAZNA Calc
            </h1>
          
        </div>

        <div class="main-content">
            <div class="grid">

                <!-- ===== Cash – Full Width ===== -->
                <div class="card full-width-card">
                    <div class="card-title">💵 Cash</div>
                    <div class="input-group">
                        <div class="currency-display">
                            <span class="currency-prefix official-riyal-symbol"></span>
                            <input type="text" inputmode="decimal" class="input-field" id="cashInput"
                                   placeholder="0.00"
                                   oninput="formatInputValue(this); calculateAll()">
                        </div>
                    </div>
                    <button class="btn" type="button" onclick="clearAll()">🗑️ Clear All</button>
                </div>

                <!-- ===== Payment Card Methods – Full Width ===== -->
                <div class="card full-width-card">
                    <div class="card-title">

    <script>
        let cardMethodCounter = 0;

        /* ======================================================
           Number Formatting
           ====================================================== */
        function formatInputValue(input) {
            const selStart = input.selectionStart;
            const oldLen   = input.value.length;

            let raw = input.value.replace(/[^0-9.]/g, '');
            const dotIdx = raw.indexOf('.');
            if (dotIdx !== -1) {
                raw = raw.slice(0, dotIdx + 1) + raw.slice(dotIdx + 1).replace(/\./g, '');
            }

            const parts = raw.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            input.value = parts.join('.');

            const diff = input.value.length - oldLen;
            const newPos = Math.max(0, selStart + diff);
            input.setSelectionRange(newPos, newPos);
        }

        function getInputVal(input) {
            return parseFloat((input.value || '0').replace(/,/g, '')) || 0;
        }

        /* ======================================================
           Calculations
           ====================================================== */
        function calculateAll() {
            const cash = getInputVal(document.getElementById('cashInput'));
            let totalCards = 0;
            document.querySelectorAll('.card-method-input').forEach(i => totalCards += getInputVal(i));
            const total = cash + totalCards;
            document.getElementById('paymentActualTotal').textContent =
                total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            calculateActualCash();
        }

        function calculateActualCards() {
            let total = 0;
            document.querySelectorAll('.actual-card-input').forEach(i => total += getInputVal(i));
            const fmt = total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('totalActualCards').textContent  = fmt;
            document.getElementById('actualCardsTotal').textContent  = fmt;
            calculateActualCash();
        }

        function calculateActualCash() {
            const tot   = parseFloat(document.getElementById('paymentActualTotal').textContent.replace(/,/g, '')) || 0;
            const cards = parseFloat(document.getElementById('totalActualCards').textContent.replace(/,/g, ''))   || 0;
            document.getElementById('actualCash').textContent =
                (tot - cards).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        /* ======================================================
           UI Helpers
           ====================================================== */
        function addCardMethod() {
            cardMethodCounter++;
            const el = document.createElement('div');
            el.className = 'input-group';
            el.innerHTML = `
                <label contenteditable="true">💳 Card ${cardMethodCounter}</label>
                <div style="display:flex; align-items:center;">
                    <div class="currency-display" style="flex:1;">
                        <span class="currency-prefix official-riyal-symbol"></span>
                        <input type="text" inputmode="decimal"
                               class="input-field card-method-input"
                               data-type="custom${cardMethodCounter}"
                               placeholder="0.00"
                               oninput="formatInputValue(this); calculateAll()">
                    </div>
                    <button class="remove-btn" type="button" onclick="removeElement(this)" title="Remove">✕</button>
                </div>`;
            document.getElementById('cardMethods').appendChild(el);
        }

        function addActualCard() {
            const el = document.createElement('div');
            el.className = 'input-group';
            el.innerHTML = `
                <div style="display:flex; align-items:center;">
                    <div class="currency-display" style="flex:1;">
                        <span class="currency-prefix official-riyal-symbol"></span>
                        <input type="text" inputmode="decimal"
                               class="input-field actual-card-input"
                               placeholder="0.00"
                               oninput="formatInputValue(this); calculateActualCards()">
                    </div>
                    <button class="remove-btn" type="button" onclick="removeActualCard(this)" title="Remove">✕</button>
                </div>`;
            document.getElementById('actualCardsGrid').appendChild(el);
        }

        function removeElement(btn) {
            btn.closest('.input-group').remove();
            calculateAll();
        }

        function removeActualCard(btn) {
            btn.closest('.input-group').remove();
            calculateActualCards();
        }

        function clearAll() {
            document.getElementById('cashInput').value = '';
            document.getElementById('cashInput').classList.remove('auto-extracted');

            document.querySelectorAll('.card-method-input').forEach(i => {
                i.value = '';
                i.classList.remove('auto-extracted');
            });

            const grid = document.getElementById('actualCardsGrid');
            grid.querySelectorAll('.input-group').forEach((grp, idx) => {
                if (idx === 0) {
                    grp.querySelector('.actual-card-input').value = '';
                } else {
                    grp.remove();
                }
            });

            calculateAll();
            calculateActualCards();
        }

        // Init
        calculateAll();
        calculateActualCards();
    </script>

    <!-- ===== Calculator JS ===== -->
<script>
let calcExpr = '';
let caretIndex = 0;

const el = {
  toggleBtn: document.getElementById('calcToggleBtn'),
  popup: document.getElementById('calculatorPopup'),
  expr: document.getElementById('calcExpression'),
  result: document.getElementById('calcResult'),
  keys: document.getElementById('calcKeys'),
  copyBtn: document.getElementById('calcCopyBtn'),
  copyNotification: document.getElementById('calcCopyNotification')
};

// Vibration Function
function calcVibrateDevice(duration = 20) {
  if ('vibrate' in navigator) {
    navigator.vibrate(duration);
  }
}

// Toggle Calculator
function toggleCalculator() { 
  el.popup.classList.toggle('active'); 
}

el.toggleBtn.addEventListener('click', (e) => { 
  e.stopPropagation(); 
  toggleCalculator(); 
});

// Close on outside click
document.addEventListener('click', (e) => {
  if (el.popup.classList.contains('active') && 
      !el.popup.contains(e.target) && 
      !el.toggleBtn.contains(e.target)) {
    el.popup.classList.remove('active');
  }
});

// 🔥 RESIZE FUNCTIONALITY
let isResizing = false;
let resizeDirection = '';
let startX = 0;
let startY = 0;
let startWidth = 0;
let startHeight = 0;

const resizeHandles = el.popup.querySelectorAll('[data-direction]');

resizeHandles.forEach(handle => {
  handle.addEventListener('mousedown', initResize);
  handle.addEventListener('touchstart', initResize);
});

function initResize(e) {
  e.preventDefault();
  e.stopPropagation();
  
  calcVibrateDevice(15);
  
  isResizing = true;
  resizeDirection = e.target.closest('[data-direction]').dataset.direction;
  
  const touch = e.touches ? e.touches[0] : e;
  startX = touch.clientX;
  startY = touch.clientY;
  
  const rect = el.popup.getBoundingClientRect();
  startWidth = rect.width;
  startHeight = rect.height;
  
  document.body.classList.add('calc-resizing');
  
  document.addEventListener('mousemove', doResize);
  document.addEventListener('mouseup', stopResize);
  document.addEventListener('touchmove', doResize);
  document.addEventListener('touchend', stopResize);
}

function doResize(e) {
  if (!isResizing) return;
  
  const touch = e.touches ? e.touches[0] : e;
  const deltaX = touch.clientX - startX;
  const deltaY = touch.clientY - startY;
  
  let newWidth = startWidth;
  let newHeight = startHeight;
  
  switch(resizeDirection) {
    case 'right':
      newWidth = startWidth + deltaX;
      break;
    case 'left':
      newWidth = startWidth - deltaX;
      break;
    case 'bottom':
      newHeight = startHeight + deltaY;
      break;
    case 'top':
      newHeight = startHeight - deltaY;
      break;
    case 'bottom-right':
      newWidth = startWidth + deltaX;
      newHeight = startHeight + deltaY;
      break;
    case 'bottom-left':
      newWidth = startWidth - deltaX;
      newHeight = startHeight + deltaY;
      break;
    case 'top-right':
      newWidth = startWidth + deltaX;
      newHeight = startHeight - deltaY;
      break;
    case 'top-left':
      newWidth = startWidth - deltaX;
      newHeight = startHeight - deltaY;
      break;
  }
  
  const minWidth = parseInt(getComputedStyle(el.popup).minWidth);
  const minHeight = parseInt(getComputedStyle(el.popup).minHeight);
  const maxWidth = parseInt(getComputedStyle(el.popup).maxWidth);
  const maxHeight = parseInt(getComputedStyle(el.popup).maxHeight);
  
  newWidth = Math.max(minWidth, Math.min(maxWidth, newWidth));
  newHeight = Math.max(minHeight, Math.min(maxHeight, newHeight));
  
  el.popup.style.width = newWidth + 'px';
  el.popup.style.height = newHeight + 'px';
}

function stopResize() {
  if (!isResizing) return;
  
  isResizing = false;
  resizeDirection = '';
  document.body.classList.remove('calc-resizing');
  
  document.removeEventListener('mousemove', doResize);
  document.removeEventListener('mouseup', stopResize);
  document.removeEventListener('touchmove', doResize);
  document.removeEventListener('touchend', stopResize);
  
  calcVibrateDevice(10);
}

/* --- Scientific Formatting Logic --- */
function formatWithCommas(str) {
  let parts = str.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts.join('.');
}

function renderExpression() {
  const MARKER = '│'; 
  let tempStr = calcExpr.slice(0, caretIndex) + MARKER + calcExpr.slice(caretIndex);
  let html = '';
  let tokens = tempStr.split(/([+\-×÷%])/);

  tokens.forEach(token => {
    if(!token) return;
    if (/[+\-×÷%]/.test(token)) {
      html += `<span class="calc-op">${token}</span>`;
    } else {
      let hasMarker = token.includes(MARKER);
      let cleanNum = token.replace(MARKER, '');
      let formattedNum = formatWithCommas(cleanNum);
      
      if (hasMarker) {
        let rawParts = token.split(MARKER);
        let prefix = rawParts[0];
        let charCount = prefix.length;
        let formattedWithCursor = '';
        
        if(charCount === 0) formattedWithCursor += '<span class="calc-caret"></span>';
        
        let matches = 0;
        for (let char of formattedNum) {
            formattedWithCursor += char;
            if (char !== ',') {
                matches++;
                if (matches === charCount) {
                    formattedWithCursor += '<span class="calc-caret"></span>';
                }
            }
        }
        html += `<span class="calc-num">${formattedWithCursor}</span>`;
      } else {
        html += `<span class="calc-num">${formattedNum}</span>`;
      }
    }
  });
  el.expr.innerHTML = html;
}

/* --- Operations --- */
function insertAtCaret(text) {
  calcExpr = calcExpr.slice(0, caretIndex) + text + calcExpr.slice(caretIndex);
  caretIndex += text.length;
  renderExpression();
  calculatePreview();
}

function backspace() {
  if (caretIndex === 0) return;
  calcExpr = calcExpr.slice(0, caretIndex - 1) + calcExpr.slice(caretIndex);
  caretIndex--;
  renderExpression();
  calculatePreview();
}

function moveCaret(dir) {
  if (dir === 'left' && caretIndex > 0) caretIndex--;
  if (dir === 'right' && caretIndex < calcExpr.length) caretIndex++;
  renderExpression();
}

function calculatePreview() {
  try {
    if (!calcExpr) { el.result.textContent = '0'; return; }
    let math = calcExpr.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-').replace(/,/g, '');
    const val = new Function('return ' + math)();
    if (!isFinite(val) || isNaN(val)) throw new Error();
    let res = String(parseFloat(val.toFixed(10)));
    el.result.textContent = formatWithCommas(res);
  } catch (e) {
    el.result.textContent = '...';
  }
}

/* --- Button Events --- */
el.keys.addEventListener('click', e => {
  const btn = e.target.closest('.btn-calc');
  if (!btn) return;
  
  calcVibrateDevice();
  
  const { action, value } = btn.dataset;

  if (action === 'number') insertAtCaret(value);
  if (action === 'operator') insertAtCaret(value);
  if (action === 'decimal') {
    let i = caretIndex - 1;
    while (i >= 0 && /[0-9.]/.test(calcExpr[i])) i--;
    let currentNum = calcExpr.slice(i + 1, caretIndex);
    if (!currentNum.includes('.')) insertAtCaret('.');
  }
  if (action === 'clear') { 
    calcExpr = ''; 
    caretIndex = 0; 
    renderExpression(); 
    el.result.textContent = '0'; 
  }
  if (action === 'backspace') backspace();
  if (action === 'percent') insertAtCaret('/100');
  if (action === 'caret-left') moveCaret('left');
  if (action === 'caret-right') moveCaret('right');
  if (action === 'equals') calculatePreview();
});

// Copy Function
el.copyBtn.addEventListener('click', () => {
  calcVibrateDevice(30);
  
  const txt = el.result.textContent.replace(/,/g, '');
  
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt)
      .then(() => {
        showCalcCopyNotification('✅ تم النسخ: ' + txt);
        el.copyBtn.innerHTML = '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg> Copied!';
        setTimeout(() => {
          el.copyBtn.innerHTML = '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Result';
        }, 1500);
      })
      .catch(err => {
        fallbackCalcCopy(txt);
      });
  } else {
    fallbackCalcCopy(txt);
  }
});

function fallbackCalcCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  
  try {
    document.execCommand('copy');
    showCalcCopyNotification('✅ تم النسخ: ' + text);
    el.copyBtn.innerHTML = '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg> Copied!';
    setTimeout(() => {
      el.copyBtn.innerHTML = '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Result';
    }, 1500);
  } catch (err) {
    showCalcCopyNotification('⚠️ فشل النسخ');
  }
  
  document.body.removeChild(textarea);
}

function showCalcCopyNotification(message) {
  el.copyNotification.textContent = message;
  el.copyNotification.classList.add('show');
  
  setTimeout(() => {
    el.copyNotification.classList.remove('show');
  }, 2000);
}

renderExpression();
</script>
