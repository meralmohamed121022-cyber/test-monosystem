<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CGP Team Galaxy</title>
    <style>
        /* --- الأساسيات والثيمات --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #0a1628 0%, #1a2940 100%);
            --card-bg: linear-gradient(145deg, rgba(26, 41, 64, 0.95), rgba(15, 25, 40, 0.98));
            --accent: #ff8c42;
            --text-color: #ffffff;
            --border-color: rgba(255, 140, 66, 0.45);
            --shadow-color: rgba(0,0,0,0.45);
            --glow-color: rgba(255, 140, 66, 0.25);
            --team-accent: #E91E63;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #eef2f7 0%, #d5dde8 100%);
            --card-bg: linear-gradient(145deg, #ffffff, #eef2f7);
            --accent: #ff6b35;
            --text-color: #1a2940;
            --border-color: rgba(255, 107, 53, 0.4);
            --shadow-color: rgba(0,0,0,0.12);
            --glow-color: rgba(255, 107, 53, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease;
            touch-action: pan-x pan-y; 
        }

        /* --- 3D Scene (تم جعلها مرئية مباشرة) --- */
        #scene {
            display: flex; /* تظهر فوراً */
            width: 100%; height: 100%;
            perspective: 1000px; align-items: center; justify-content: center;
            cursor: grab; position: relative; background: transparent;
        }
        #scene:active { cursor: grabbing; }

        .world-container { transform-style: preserve-3d; transition: transform 0.1s ease-out; }
        .orbit-container { transform-style: preserve-3d; }
        .orbit-ring {
            position: absolute; width: 1200px; height: 1200px;
            top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(90deg);
            border-radius: 50%; border: 2px dashed rgba(255,255,255,0.1);
        }

        .center-logo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; animation: floatLogo 3s ease-in-out infinite; z-index: 50;
        }
        .center-logo img { width: 100%; filter: drop-shadow(0 0 20px var(--team-accent)); }
        @keyframes floatLogo { 0%, 100% { transform: translate(-50%, -50%) translateY(0); } 50% { transform: translate(-50%, -50%) translateY(-15px); } }

        .member-card {
            position: absolute; left: 50%; top: 50%; width: 110px; height: 160px;
            margin-left: -55px; margin-top: -80px; background: #161b22;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            transition: 0.3s; pointer-events: auto; z-index: 100;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .member-card:hover { border-color: var(--team-accent); box-shadow: 0 0 30px var(--team-accent); z-index: 1000; transform: scale(1.1) !important; }
        .card-img-box { width: 100%; height: 120px; transform: translateY(100%); opacity: 0; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); background: #222;}
        .card-img-box.revealed { transform: translateY(0); opacity: 1; }
        .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-name-box { width: 100%; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; text-align: center; line-height: 1.1;}

        /* --- UI Controls --- */
        .theme-toggle { position: fixed; top: 22px; right: 22px; z-index: 2000; width: 45px; height: 45px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border-color); cursor: pointer; color: var(--text-color); font-size: 1.2rem;}

        /* Details Overlay */
        .details-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 9000; backdrop-filter: blur(4px); }
        .details-overlay.active { opacity: 1; pointer-events: auto; }
        .details-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -40%) scale(0.9); width: 85%; max-width: 380px; background: #161b22; border: 2px solid var(--team-accent); border-radius: 15px; padding: 25px; opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 9999; text-align: center; }
        .details-panel.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .d-img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--team-accent); margin-bottom: 15px; object-fit: cover;}
    .back-to-home {
    position: fixed;
    top: 25px;
    left: 25px;
    z-index: 10000;
    background: linear-gradient(135deg, #ff8c42 0%, #ff6b35 100%);
    color: #ffffff;
    border: none;
    padding: 10px 22px;
    border-radius: 50px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 140, 66, 0.4);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    gap: 8px;
}

.back-to-home:hover {
    transform: scale(1.08) translateX(5px);
    box-shadow: 0 6px 25px rgba(255, 140, 66, 0.6);
}

/* عشان يظهر كويس على الموبايل */
@media (max-width: 480px) {
    .back-to-home {
        top: 15px;
        left: 15px;
        padding: 8px 15px;
        font-size: 13px;
    }
}
    </style>
</head>

<body data-theme="dark">
<button class="back-to-home" onclick="window.location.href='cgp.htm'">⬅ Back to Home</button>
    <button class="theme-toggle" id="themeToggle">☀️</button>

    <div id="scene">
        <div class="world-container" id="world">
            <div class="orbit-container" id="orbitContainer">
                <div class="orbit-ring"></div>
                <div class="center-logo"><img src="https://i.postimg.cc/MHYtNdTY/20251129-104938-0000.png"></div>
            </div>
        </div>
    </div>

    <div class="details-overlay" id="overlay" onclick="closeDetails()"></div>
    <div class="details-panel" id="detailsPanel">
        <img id="dImg" class="d-img">
        <h2 id="dName" style="color:var(--team-accent)"></h2>
        <h3 id="dRole" style="color:#8b949e; font-size:0.9rem; margin:10px 0"></h3>
        <p id="dBio" style="color:#c9d1d9; font-size:0.85rem; line-height:1.5"></p>
    </div>

    <script>
      const members = [
    { img: "https://i.postimg.cc/mgWF4zZS/6-20251129-184528-0005.png", name: "Mohamed Kholeif", role: "Knowledge Team", bio: "", color: "rgba(156, 39, 176, 0.4)" },
    { img: "https://i.postimg.cc/pdq9KsQx/10-20251129-184528-0009.png", name: "Mohamed Gad", role: "Knowledge Team", bio: "", color: "rgba(33, 150, 243, 0.4)" },
    { img: "https://i.postimg.cc/s2wB5TYJ/13-20251129-184529-0012.png", name: "Hassan Ibrahim", role: "Knowledge Team", bio: "", color: "rgba(0, 150, 136, 0.4)" },
    { img: "https://i.postimg.cc/s2VQBkhQ/2-20251129-184528-0001.png", name: "Islam Elgendy", role: "Knowledge Team", bio: "", color: "rgba(233, 30, 99, 0.4)" },
    { img: "https://i.postimg.cc/qvc6vJzC/3-20251129-184528-0002.png", name: "Mahmoud Foley", role: "Knowledge Team", bio: "", color: "rgba(76, 175, 80, 0.4)" },
    { img: "https://i.postimg.cc/dVcTFktw/4-20251129-184528-0003.png", name: "Ibrahim Khattab", role: "Knowledge Team", bio: "", color: "rgba(63, 81, 181, 0.4)" },
    { img: "https://i.postimg.cc/8zdfzpj1/5-20251129-184528-0004.png", name: "Ahmed Kamil", role: "Knowledge Team", bio: "", color: "rgba(255, 152, 0, 0.4)" },
    { img: "https://i.postimg.cc/RVHn2Qmf/7-20251129-184528-0006.png", name: "Mordy Mohamed", role: "Knowledge Team", bio: "", color: "rgba(0, 188, 212, 0.4)" },
    { img: "https://i.postimg.cc/xTzbByQv/9-20251129-184528-0008.png", name: "Ahmed Yousry", role: "Knowledge Team", bio: "", color: "rgba(244, 67, 54, 0.4)" },
    { img: "https://via.placeholder.com/110x120", name: "Hussein Seleim", role: "Knowledge Team", bio: "", color: "rgba(255, 193, 7, 0.4)" },
    { img: "https://via.placeholder.com/110x120", name: "Moaz Abdelwahab", role: "Knowledge Team", bio: "", color: "rgba(103, 58, 183, 0.4)" },
    { img: "https://via.placeholder.com/110x120", name: "Mahmoud Zidan", role: "Knowledge Team", bio: "", color: "rgba(121, 85, 72, 0.4)" },
    { img: "https://i.postimg.cc/nLHjsyDS/14-20251129-184529-0013.png", name: "Mahmoud Elshahat", role: "Design Team", bio: "", color: "rgba(96, 125, 139, 0.4)" },
    { img: "https://i.postimg.cc/FK9dfMLZ/15-20251129-184529-0014.png", name: "Ahmed Megahed", role: "Design Team", bio: "", color: "rgba(255, 87, 34, 0.4)" },
    { img: "https://i.postimg.cc/fbwt3G9m/16-20251129-184529-0015.png", name: "Mahmoud Assy", role: "Design Team", bio: "", color: "rgba(205, 220, 57, 0.4)" },
    { img: "https://via.placeholder.com/110x120", name: "Saeid Khalifa", role: "Design Team", bio: "", color: "rgba(33, 150, 243, 0.4)" }
];


        let rotX = -5, rotY = 0, zoomZ = -500, panX = 0, panY = 0;
        let isDragging = false, lastX, lastY, moveDist = 0, velX = 0, velY = 0.08;
        let initialPinchDistance = null;

        function init() {
            const orbit = document.getElementById('orbitContainer');
            members.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'member-card';
                card.style.transform = `rotateY(${(360/members.length)*i}deg) translateZ(600px)`;
                card.innerHTML = `<div class="card-img-box"><img src="${m.img}" onerror="this.src='https://via.placeholder.com/110x120/222/fff?text=No+Img'"></div><div class="card-name-box" style="background:${m.color}">${m.name}</div>`;
                card.onclick = (e) => { if(moveDist < 15) openDetails(m); e.stopPropagation(); };
                orbit.appendChild(card);
                setTimeout(() => {
                    const imgBox = card.querySelector('.card-img-box');
                    if(imgBox) imgBox.classList.add('revealed');
                }, i * 80);
            });
            animate();
        }

        function openDetails(m) {
            document.getElementById('dImg').src = m.img || 'https://via.placeholder.com/110x120/222/fff?text=No+Img';
            document.getElementById('dName').innerText = m.name;
            document.getElementById('dRole').innerText = m.role;
            document.getElementById('dBio').innerText = m.bio;
            document.getElementById('detailsPanel').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeDetails() {
            document.getElementById('detailsPanel').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        const scene = document.getElementById('scene');
        
        function handleDragStart(x, y) {
            isDragging = true; 
            moveDist = 0; 
            lastX = x; 
            lastY = y;
        }

        function handleDragMove(x, y) {
            if(!isDragging) return;
            const dx = x - lastX;
            const dy = y - lastY;
            moveDist += Math.abs(dx) + Math.abs(dy);
            rotY += dx * 0.4; 
            rotX = Math.max(-70, Math.min(70, rotX - dy * 0.4));
            velY = dx * 0.05; 
            velX = -dy * 0.05;
            lastX = x; 
            lastY = y;
        }

        function handleDragEnd() {
            isDragging = false;
        }

        function getPinchDistance(e) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        scene.addEventListener('mousedown', (e) => handleDragStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleDragMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleDragEnd);
        scene.addEventListener('wheel', (e) => zoomZ = Math.max(-2500, Math.min(800, zoomZ - e.deltaY * 1.5)), {passive: true});

        scene.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialPinchDistance = getPinchDistance(e);
                isDragging = false; 
            } else if (e.touches.length === 1) {
                handleDragStart(e.touches[0].clientX, e.touches[0].clientY);
                initialPinchDistance = null;
            }
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDistance !== null) {
                const currentDistance = getPinchDistance(e);
                const delta = currentDistance - initialPinchDistance;
                zoomZ = Math.max(-2500, Math.min(800, zoomZ + delta * 3));
                initialPinchDistance = currentDistance;
                e.preventDefault();
            } else if (e.touches.length === 1 && isDragging) {
                handleDragMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, {passive: false});

        window.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) initialPinchDistance = null;
            if (e.touches.length === 0) handleDragEnd();
        });

        function animate() {
            if(!isDragging && initialPinchDistance === null) { 
                rotY += velY; 
                rotX += velX; 
                velY *= 0.95; 
                velX *= 0.95; 
                if(Math.abs(velY) < 0.05) velY = 0.08;
            }
            const world = document.getElementById('world');
            if(world) world.style.transform = `translateX(${panX}px) translateY(${panY}px) translateZ(${zoomZ}px)`;
            const orbit = document.getElementById('orbitContainer');
            if(orbit) orbit.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            requestAnimationFrame(animate);
        }

        document.getElementById('themeToggle').onclick = () => {
            const b = document.body;
            const isL = b.getAttribute('data-theme') === 'light';
            b.setAttribute('data-theme', isL ? 'dark' : 'light');
            document.getElementById('themeToggle').innerText = isL ? '☀️' : '🌙';
        };

        init();
    </script>
</body>
</html>
